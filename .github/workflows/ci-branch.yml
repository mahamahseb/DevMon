name: CI branch

on:
  push:
    branches: [CI]
  workflow_dispatch:

jobs:
  branch-deploy:
    runs-on: [self-hosted, linux, minikube]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall app.py devmon
      - run: docker build -t branch-devmon:latest .
      - run: minikube image load branch-devmon:latest
      - run: kubectl apply -f k8s/branch-devmon.yaml
      - run: kubectl rollout status deployment/branch-devmon -n branch-devmon --timeout=120s
