name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall app.py devmon
      - run: python -m pytest
      - run: docker build -t devmon:ci .

  publish:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devmon:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devmon:latest

  deploy:
    if: github.event_name == 'push'
    needs: publish
    runs-on: [self-hosted, linux, minikube]
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/deploy-minikube.sh
      - run: scripts/deploy-minikube.sh
        env:
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          USE_REMOTE_IMAGES: "1"
